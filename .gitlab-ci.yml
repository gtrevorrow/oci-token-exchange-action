image: node:20

.oci_setup: &oci_setup |
  curl -LO https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
  bash install.sh --accept-all-defaults
  source ~/.bashrc

deploy:
  script:
    # Install OCI CLI
    - *oci_setup

    # Build the CLI from the commit GitLab checked out for this job
    - npm ci
    - npm run build:cli

    # Map the requested GitLab ID token to the variable the CLI expects
    - export CI_JOB_JWT_V2="$ID_TOKEN"

    # Run the CLI
    - |
      PLATFORM=gitlab \
      OIDC_CLIENT_IDENTIFIER=${OIDC_CLIENT_IDENTIFIER} \
      DOMAIN_BASE_URL=${DOMAIN_BASE_URL} \
      OCI_TENANCY=${OCI_TENANCY} \
      OCI_REGION=${OCI_REGION} \
      OCI_HOME=${CI_PROJECT_DIR} \
      OCI_PROFILE=${OCI_PROFILE} \
      RETRY_COUNT=${RETRY_COUNT:-3} \
      node dist/cli.js

    # Verify OCI CLI configuration works with the generated security token
    - oci --auth security_token os ns get

  rules:
    - if: $CI_COMMIT_BRANCH

  id_tokens:
    ID_TOKEN:
      aud: https://cloud.oracle.com/gitlab
